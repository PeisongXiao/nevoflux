<!doctype html>
<html>
<head><meta charset="utf-8"></head>
<body>
  <div id="stage" data-composition-id="multi-tl" data-width="1080" data-height="1080" data-duration="8" data-fps="30" data-start="0">
    <div class="clip scene" id="scene-1" data-start="0" data-duration="4" data-track-index="0">
      <img id="hero-1" src="assets/hello-kitty.png" />
    </div>
    <div class="clip scene" id="scene-2" data-start="4" data-duration="4" data-track-index="0">
      <img id="hero-2" src="assets/hello-kitty.png" />
    </div>
  </div>
  <script type="module">
    import gsap from 'https://esm.sh/gsap@3.13';
    window.__timelines = window.__timelines || [];

    // BAD: per-scene paused timelines pushed separately. Render driver
    // seeks each with MASTER time; tl2's local-time tweens hold end-state
    // long before scene-2's clip window opens.
    const tl1 = gsap.timeline({ paused: true });
    tl1.from('#hero-1', { scale: 0, duration: 0.9 }, 0.15);
    window.__timelines.push(tl1);

    const tl2 = gsap.timeline({ paused: true });
    tl2.from('#hero-2', { scale: 0.3, duration: 0.7 }, 0.1);
    tl2.to('#scene-2', { opacity: 0, duration: 0.6 }, 3.2);
    window.__timelines.push(tl2);
  </script>
</body>
</html>
