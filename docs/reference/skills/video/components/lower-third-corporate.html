<style>

    left: var(--aspect-safe_sides, 80px);

    pointer-events: none;
    overflow: hidden;
  }
  .lower-third-corporate .lower-third-corporate-band {
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: var(--spacing-md, 16px);
    background: var(--color-primary, #1a6b6b);
    border-left: 6px solid var(--color-secondary, #4a7a7a);
    border-radius: var(--rounded-sm, 2px);
    padding: var(--spacing-md, 16px) var(--spacing-lg, 24px);
    min-width: 480px;
  }
  .lower-third-corporate .lower-third-corporate-name {
    font-family: var(--typography-hero-family, 'Inter, sans-serif');

<!-- AGENT: 替换姓名 / 职位文本；调整 data-start / data-duration -->
<div class="clip lower-third-corporate"
     id="lower-third-corporate-1"
     data-start="2.0"
     data-duration="4.0"
     data-track-index="15">
  <div class="lower-third-corporate-band">
    <div class="lower-third-corporate-name">姓名 / Name</div>
    <div class="lower-third-corporate-title">职位 · Company</div>
  </div>
</div>

<script type="module">
  import { gsap } from 'https://esm.sh/gsap@3.13';

  const clip = document.querySelector('#lower-third-corporate-1');
  const band = clip.querySelector('.lower-third-corporate-band');
  const duration = parseFloat(clip.dataset.duration ?? '4');

  const SLIDE_DUR = 0.5;
  const ease_in  = 'power3.out';
  const ease_out = 'power2.in';
  // Hold time: total duration minus slide-in and slide-out
  const hold = Math.max(0, duration - SLIDE_DUR * 2);

  const tl = gsap.timeline({ paused: true });

  // Slide in from left
  tl.fromTo(band,
    { x: -600, opacity: 0 },
    { x: 0, opacity: 1, duration: SLIDE_DUR, ease: ease_in }
  );

  // Hold
  tl.to(band, { x: 0, opacity: 1, duration: hold });

  // Slide out to left
  tl.to(band,
    { x: -600, opacity: 0, duration: SLIDE_DUR, ease: ease_out }
  );

  window.__timelines = window.__timelines || [];
  window.__timelines.push(tl);
</script>
