<!DOCTYPE html>
<!--
  template: product-3d-spin
  purpose: Minimal Three.js 3D product spin.
  best for: product 360° showcase, logo hover-spin.

  AGENT INTEGRATION:
  1. IcosahedronGeometry is a placeholder; load the real product .glb via GLTFLoader.
  2. rotation.y completes two full turns per 10s; tweak the duration ratio for a slower spin.
  3. material.color is driven by the CSS var --color-primary.

  VISUAL:
  - 1920×1080 on black background.
  - Centered IcosahedronGeometry, 20-face slow rotation.
  - 3-point lighting (ambient + key + rim).

  CONSTRAINTS:
  - WebGLRenderer must enable preserveDrawingBuffer: true.
  - The renderer instance must be pushed to window.__threeRenderers.
  - Fixed 1920×1080 / 30fps / 10s.
  - No AnimationMixer (if used, mixer.setTime is required).
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <script src="https://esm.sh/three@0.160"></script>
  <script src="https://esm.sh/gsap@3.13"></script>
  <style>
    /* Brand layer is provided by the daemon-injected <style data-nf-* > block
       at the top of <head>. DO NOT redeclare --color-* here with hardcoded
       values — those would override the injected DESIGN.md values per CSS
       cascade order. Consumers below carry inline fallbacks for the
       no-injection (standalone preview) case. */

    body {
      margin: 0;
      background: #000;
      overflow: hidden;
    }

    #stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      background: var(--color-background, #000);
      overflow: hidden;
    }

    #three-canvas {
      display: block;
    }
  </style>
</head>
<body>

<div id="stage"
     data-composition-id="product-3d-spin"
     data-width="1920"
     data-height="1080"
     data-duration="10"
     data-fps="30"
     data-bg="#000"
     data-start="0">

  <canvas id="three-canvas" class="clip"
          data-start="0" data-duration="10" data-track-index="1"
          width="1920" height="1080"></canvas>

</div>

<script>
  // ── Scene & Camera ────────────────────────────────────────────────────────────
  const canvas = document.getElementById('three-canvas');
  const scene  = new THREE.Scene();

  const bgHex = getComputedStyle(document.documentElement)
    .getPropertyValue('--color-background')?.trim() || '#000000';
  scene.background = new THREE.Color(bgHex);

  // Camera stays fixed — no dolly; continuous spin drives the drama.
  const camera = new THREE.PerspectiveCamera(50, 1920 / 1080, 0.1, 100);
  camera.position.set(0, 0, 4);

  // ── Renderer — preserveDrawingBuffer REQUIRED (nf/three-renderer) ─────────────
  const renderer = new THREE.WebGLRenderer({
    canvas,
    antialias: true,
    preserveDrawingBuffer: true,
  });
  renderer.setSize(1920, 1080);
  renderer.setPixelRatio(1);

  // ── Register renderer — REQUIRED (nf/three-register) ──────────────────────────
  window.__threeRenderers = window.__threeRenderers || [];
  window.__threeRenderers.push({ renderer, scene, camera });

  // ── Geometry & Material ───────────────────────────────────────────────────────
  // AGENT: swap IcosahedronGeometry for a real product mesh loaded with GLTFLoader.
  // detail=1 → 80 triangles — distinctive "faceted crystal" silhouette.
  const primaryHex = getComputedStyle(document.documentElement)
    .getPropertyValue('--color-primary')?.trim() || '#1a6b6b';

  const geometry = new THREE.IcosahedronGeometry(1, 1);
  const material = new THREE.MeshStandardMaterial({
    color:     new THREE.Color(primaryHex),
    roughness: 0.25,
    metalness: 0.7,
  });
  const mesh = new THREE.Mesh(geometry, material);
  scene.add(mesh);

  // ── Lighting — 3-point: ambient + key + rim ───────────────────────────────────
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));

  const keyLight = new THREE.DirectionalLight(0xffffff, 1.0);
  keyLight.position.set(3, 4, 5);
  scene.add(keyLight);

  // Rim light — behind the mesh to catch silhouette edges.
  const rimLight = new THREE.DirectionalLight(0xffffff, 0.6);
  rimLight.position.set(-3, -2, -4);
  scene.add(rimLight);

  // ── GSAP Timeline (paused — externally seek-driven via window.__nfRenderTime) ──
  // No AnimationMixer; GSAP is seek-safe (nf/mixer-settime satisfied).
  window.__timelines = window.__timelines || [];

  const tl = gsap.timeline({ paused: true });

  // 0 – 10s: continuous Y-axis spin — 2 full turns (Math.PI * 4), linear.
  tl.to(mesh.rotation, {
    y: Math.PI * 4,
    duration: 10,
    ease: 'none',
  }, 0);

  // 0 – 10s: optional slow ambient X-axis tilt — subtle "breathing" feel.
  tl.to(mesh.rotation, {
    x: Math.PI * 0.08,
    duration: 10,
    ease: 'power1.inOut',
  }, 0);

  window.__timelines.push(tl);

  // Auto-play in preview mode (no render driver present)
  if (typeof window.__nfRenderTime === 'undefined') tl.play();
</script>

</body>
</html>
